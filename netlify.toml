[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite inlines VITE_* vars into the client bundle - this is expected.
  # Firebase/Cloudinary config are public client-side values; security is via Firestore rules and Auth.
  SECRETS_SCAN_OMIT_KEYS = "VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID,VITE_CLOUDINARY_CLOUD_NAME,VITE_CLOUDINARY_UPLOAD_PRESET"

[[headers]]
  for = "/*"
  [headers.values]
    # Allow 'unsafe-eval' for Firebase SDK; relaxes CSP to fix Chrome Issues tab warning
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://apis.google.com https://*.googleapis.com https://*.firebaseapp.com https://*.firebaseio.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com wss://*.firebaseio.com https://*.cloudinary.com https://securetoken.googleapis.com; frame-src 'self' https://*.firebaseapp.com https://*.google.com;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
